# Called from each child repo: runs the same LangGraph tick against THIS repo's Issues (memory + tasks).
# Uses the caller's GITHUB_TOKEN (issues: write) — no org-wide repo creation (SEPS_CHILD_TICK_ONLY).
name: SEPS child orchestrate

on:
  workflow_call:
    inputs:
      github_org:
        required: true
        type: string
      repo_short_name:
        required: true
        type: string

permissions:
  contents: read
  issues: write

jobs:
  seps-tick:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          repository: ${{ inputs.github_org }}/orchestrator-core
          ref: main
          path: orch

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "0.8.5"

      - name: Child tick (observe → plan → act → remember)
        working-directory: orch
        env:
          CI: true
          GH_PROMPT_DISABLED: "1"
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_ORG: ${{ inputs.github_org }}
          SEPS_MEMORY_REPO: ${{ inputs.repo_short_name }}
          SEPS_TASKS_REPO: ${{ inputs.repo_short_name }}
          SEPS_CHILD_TICK_ONLY: "1"
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          uv sync
          uv run seps once
