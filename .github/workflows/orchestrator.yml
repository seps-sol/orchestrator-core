name: Orchestrator tick

# Manual Actions only (no `repository_dispatch`). Run from the Actions tab.
on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  tick:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "0.8.5"

      - name: Sync and run one cycle
        env:
          CI: true
          GH_PROMPT_DISABLED: "1"
          GITHUB_TOKEN: ${{ secrets.SEPS_GITHUB_TOKEN || secrets.GITHUB_TOKEN }}
          GH_TOKEN: ${{ secrets.SEPS_GITHUB_TOKEN || secrets.GITHUB_TOKEN }}
          GITHUB_ORG: seps-sol
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          gh --version
          chmod +x scripts/pull_org_repos.sh scripts/publish_org_profile.sh
          uv sync
          ./scripts/pull_org_repos.sh
          uv run seps once
          uv run seps bootstrap workflows
          chmod +x scripts/dispatch_downstream.sh
          scripts/dispatch_downstream.sh "${{ github.event.repository.name }}"
          ./scripts/publish_org_profile.sh
