# SEPS: child self-run (manual Actions only; no `repository_dispatch` in template).
# Placeholders: __SEPS_DOWNSTREAM_JSON__, __SEPS_REUSABLE_ORCHESTRATE__ (filled by bootstrap).
name: SEPS child self run

on:
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  pulse:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Heartbeat
        run: |
          echo "repository=${{ github.repository }}"
          echo "ref=${{ github.ref }}"
          echo "event=${{ github.event_name }}"
          echo "time_utc=$(date -uIs)"
          for f in package.json Cargo.toml Anchor.toml pyproject.toml go.mod; do
            if [ -f "$f" ]; then echo "found $f"; fi
          done

      - name: Trigger downstream SEPS repos
        if: success()
        env:
          GH_TOKEN: ${{ secrets.SEPS_CROSS_REPO_TOKEN }}
          SEPS_DOWNSTREAM_JSON: '__SEPS_DOWNSTREAM_JSON__'
        run: |
          if [ -z "${GH_TOKEN:-}" ]; then
            echo "SEPS_CROSS_REPO_TOKEN not set; skipping cross-repo dispatch (set it to a PAT with repo scope)."
            exit 0
          fi
          ORG="${{ github.repository_owner }}"
          echo "$SEPS_DOWNSTREAM_JSON" | jq -e . >/dev/null 2>&1 || { echo "invalid SEPS_DOWNSTREAM_JSON"; exit 0; }
          echo "$SEPS_DOWNSTREAM_JSON" | jq -r '.[]' | while read -r TARGET; do
            [ -z "$TARGET" ] && continue
            echo "→ dispatch seps_upstream to $ORG/$TARGET (from ${{ github.repository }})"
            jq -nc --arg from "${{ github.repository }}" \
              '{event_type:"seps_upstream",client_payload:{from:$from}}' \
              | gh api --method POST "repos/$ORG/$TARGET/dispatches" --input - \
              || echo "warn: dispatch failed for $TARGET"
          done

  orchestrate:
    needs: pulse
    if: success()
    uses: __SEPS_REUSABLE_ORCHESTRATE__
    secrets: inherit
    with:
      github_org: ${{ github.repository_owner }}
      repo_short_name: ${{ github.event.repository.name }}
